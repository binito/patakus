name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Falha o build em vulnerabilidades critical (sem exceções)
      - name: Audit API — critical
        run: npm audit --audit-level=critical -w apps/api

      - name: Audit Web — critical
        run: npm audit --audit-level=critical -w apps/web

      # Vulnerabilidades high/moderate registadas como aviso (requerem NestJS v11 / Next 16)
      # Ver: docs/security-audit.md para plano de remediação
      - name: Audit API — high/moderate (informativo)
        run: npm audit --audit-level=high -w apps/api
        continue-on-error: true

      - name: Audit Web — high/moderate (informativo)
        run: npm audit --audit-level=high -w apps/web
        continue-on-error: true

      # Relatório completo como artefacto para revisão
      - name: Generate audit report
        run: |
          echo "## API" > audit-report.txt
          npm audit -w apps/api 2>&1 >> audit-report.txt || true
          echo -e "\n## Web" >> audit-report.txt
          npm audit -w apps/web 2>&1 >> audit-report.txt || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit-report.txt
          retention-days: 30

  lint-and-test:
    name: Lint + Test (API)
    runs-on: ubuntu-latest
    needs: security-audit

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api
        env:
          DATABASE_URL: mysql://user:pass@localhost:3306/db

      - name: Run API tests
        run: npm test -w apps/api -- --coverage
        env:
          DATABASE_URL: mysql://user:pass@localhost:3306/db
          JWT_SECRET: test-secret-for-ci-only-not-production
          FRONTEND_URL: http://localhost:3000
          ALLOWED_ORIGINS: http://localhost:3000

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: apps/api/coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api
        env:
          DATABASE_URL: mysql://user:pass@localhost:3306/db

      - name: Build API
        run: npm run build -w apps/api
        env:
          DATABASE_URL: mysql://user:pass@localhost:3306/db
          JWT_SECRET: build-placeholder
          FRONTEND_URL: https://placeholder.example.com
          ALLOWED_ORIGINS: https://placeholder.example.com

      - name: Build Web
        run: npm run build -w apps/web
        env:
          NEXT_PUBLIC_API_URL: /api
